spring:
  application:
    name: healthcare-api
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:healthcare_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  flyway:
    enabled: true
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: "${JWT_SECRET:dev-secret-key-change-in-production-min-32-chars-required}"
    access-token-expiry-hours: 24
    refresh-token-expiry-days: 30
  photo:
    signed-url-ttl-minutes: 15
  cache:
    food-search-ttl-days: 30
    user-profile-ttl-minutes: 60
  notifications:
    max-per-day: 2
  food-api:
    public-api-key: "${PUBLIC_FOOD_API_KEY:}"
    processed-food-api-url: https://api.data.go.kr/openapi/tn_pubr_public_nutri_process_info_api
    general-food-api-url: https://api.data.go.kr/openapi/tn_pubr_public_nutri_food_info_api
